name: Documentation
description: Report missing, unclear, or stale documentation.
title: "[Docs]: "
labels: ["needs-triage"]
body:
  - type: textarea
    id: location
    attributes:
      label: Location
      description: Link or path to the relevant document.
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: Problem
      description: What is missing, unclear, or wrong?
    validations:
      required: true
  - type: textarea
    id: suggested
    attributes:
      label: Suggested change
