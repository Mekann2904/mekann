name: Feature request
description: Suggest a new capability or workflow improvement.
title: "[Feature]: "
labels: ["needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or agent workflow is blocked or painful?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior you want.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Existing commands, settings, features, or workarounds you tried.
  - type: textarea
    id: docs
    attributes:
      label: Documentation impact
      description: Which README, docs, CONTEXT, or ADR might need to change?
