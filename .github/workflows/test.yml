name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  quality-gates:
    if: vars.ENABLE_WORKSPACE_QUALITY_GATES == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify workspace quality policy
        run: npm run policy:workspace

      - name: Run workspace verification gate
        env:
          CI_WORKSPACE_VERIFY_PREVIEW_COMMAND: ${{ vars.CI_WORKSPACE_VERIFY_PREVIEW_COMMAND }}
          CI_WORKSPACE_VERIFY_UI_BASE_URL: ${{ vars.CI_WORKSPACE_VERIFY_UI_BASE_URL }}
          CI_WORKSPACE_VERIFY_UI_COMMAND: ${{ vars.CI_WORKSPACE_VERIFY_UI_COMMAND }}
          CI_WORKSPACE_VERIFY_FAIL_ON_HIGH_SEVERITY: "true"
        run: npm run ci:workspace-verification

      - name: Apply branch protection policy
        if: github.event_name == 'push' && github.ref_name == 'main'
        env:
          GITHUB_TOKEN: ${{ secrets.BRANCH_PROTECTION_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_PROTECTED_BRANCHES: main,master
          ENABLE_WORKSPACE_QUALITY_GATES: ${{ vars.ENABLE_WORKSPACE_QUALITY_GATES }}
        run: npm run policy:apply-branch-protection

      - name: Upload workspace verification artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: workspace-verification-artifacts
          path: |
            .pi/verification-runs/
            .pi/evals/workspace-verification/
            .pi/workspace-verification/reviews/
            .pi/workspace-verification/continuity.json
            .pi/workspace-verification/trajectory.json
          if-no-files-found: ignore

  compatibility:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type check
        run: npm run typecheck

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm test

  security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=moderate
        # Security vulnerabilities should block PRs
        # Set continue-on-error: true only for known accepted risks
