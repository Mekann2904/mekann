name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  quality-gates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run workspace verification gate
        run: npm run ci:workspace-verification

      - name: Upload workspace verification artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: workspace-verification-artifacts
          path: |
            .pi/verification-runs/
            .pi/evals/workspace-verification/
            .pi/workspace-verification/reviews/
            .pi/workspace-verification/continuity.json
          if-no-files-found: ignore

  compatibility:
    runs-on: ubuntu-latest
    needs: quality-gates

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type check
        run: npm run typecheck

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm test

  security:
    runs-on: ubuntu-latest
    needs: quality-gates

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=moderate
        # Security vulnerabilities should block PRs
        # Set continue-on-error: true only for known accepted risks
