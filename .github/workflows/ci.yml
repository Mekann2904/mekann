name: CI

on:
  push:
  pull_request:

jobs:
  plan-mode:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plan-mode
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test

  sandbox-unit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sandbox
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests (non-macOS — integration tests silently skipped)
        run: npm test

  sandbox-macos:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: sandbox
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Full tests (macOS sandbox integration — fail if sandbox-exec unavailable)
        run: RUN_MAC_SANDBOX_TESTS=1 npm test

  zip-repo:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: zip-repo
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test
