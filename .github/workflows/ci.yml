name: CI

on:
  push:
  pull_request:

jobs:
  mekann:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm ci --workspaces --include-workspace-root

      - name: Unit tests
        run: npm run test:mekann

  prompt-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm ci --workspaces --include-workspace-root

      - name: Unit tests
        run: npm run test:prompt-core

  cache-friendly-prompt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm ci --workspaces --include-workspace-root

      - name: Unit tests
        run: npm run test:cache-friendly-prompt

  agent-guidelines:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm ci --workspaces --include-workspace-root

      - name: Unit tests
        run: npm run test:agent-guidelines

  model-optimizer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm ci --workspaces --include-workspace-root

      - name: Unit tests
        run: npm run test:model-optimizer

  command-normalization:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm ci --workspaces --include-workspace-root

      - name: Unit tests
        run: npm run test:command-normalization

  modes:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mekann/safety/modes
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm ci --workspaces=false

      - name: Unit tests with coverage
        run: npx vitest run --coverage --fileParallelism=false

      - name: Coverage threshold check
        run: |
          echo "Checking coverage thresholds..."
          # Extract statement coverage from coverage summary
          COVERAGE=$(cat coverage/coverage-summary.json 2>/dev/null | jq '.total.lines.pct' 2>/dev/null || echo "0")
          echo "Line coverage: ${COVERAGE}%"
          # Fail if coverage drops below 85%
          if [ "$(echo "$COVERAGE < 85" | bc -l)" = "1" ]; then
            echo "::error::Coverage ${COVERAGE}% is below threshold 85%"
            exit 1
          fi

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: modes-coverage
          path: mekann/safety/modes/coverage/
          retention-days: 7

  sandbox-unit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mekann/safety/sandbox
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm ci --workspaces=false

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests with coverage (non-macOS — integration tests silently skipped)
        run: npx vitest run --coverage

      - name: Coverage threshold check
        run: |
          echo "Checking coverage thresholds..."
          COVERAGE=$(cat coverage/coverage-summary.json 2>/dev/null | jq '.total.lines.pct' 2>/dev/null || echo "0")
          echo "Line coverage: ${COVERAGE}%"
          # Fail if coverage drops below 89%
          if [ "$(echo "$COVERAGE < 89" | bc -l)" = "1" ]; then
            echo "::error::Coverage ${COVERAGE}% is below threshold 89%"
            exit 1
          fi

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sandbox-unit-coverage
          path: mekann/safety/sandbox/coverage/
          retention-days: 7

  sandbox-macos:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: mekann/safety/sandbox
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm ci --workspaces=false

      - name: Typecheck
        run: npm run typecheck

      - name: Full tests (macOS sandbox integration — fail if sandbox-exec unavailable)
        run: RUN_MAC_SANDBOX_TESTS=1 npm test

  zip-repo:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mekann/utils/zip-repo
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm ci --workspaces=false

      - name: Unit tests
        run: npm test

  subagent:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mekann/autonomy/subagent
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm ci --workspaces=false

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

  autoresearch:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mekann/autonomy/autoresearch
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm ci --workspaces=false

      - name: Unit tests
        run: npm test

  goal:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mekann/autonomy/goal
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm ci --workspaces=false

      - name: Unit tests
        run: npm test

  output-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm ci --workspaces --include-workspace-root

      - name: Unit tests
        run: npm run test:output-gate

  typecheck-prod:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm ci --workspaces --include-workspace-root

      - name: Production typecheck
        run: npm run typecheck:prod

  ledger:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm ci --workspaces --include-workspace-root

      - name: Unit tests
        run: npm run test:ledger

  # ─── Type-safety gates (issue #141) ────────────────────────────────
  # `lint` enforces @typescript-eslint/no-explicit-any (warn repo-wide,
  # error on the cleaned ERROR_TIER files). `as-any-baseline` fails if the
  # non-test `as any` count grows beyond scripts/as-any-baseline.json.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm ci --workspaces --include-workspace-root

      - name: ESLint (no-explicit-any)
        run: npm run lint

  as-any-baseline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Check `as any` baseline
        run: bash scripts/check-as-any-baseline.sh
  # ─── Aggregate test count ──────────────────────────────────────────
  # Keep `needs:` in sync with every job above. Job results are echoed from
  # `needs.<job>.result` so the summary always reflects reality, and the gate
  # step fails the run unless every listed job succeeded.

  test-summary:
    runs-on: ubuntu-latest
    needs:
      [mekann, prompt-core, cache-friendly-prompt, agent-guidelines, model-optimizer, command-normalization, modes, sandbox-unit, sandbox-macos, zip-repo, subagent, autoresearch, goal, output-gate, typecheck-prod, ledger, lint, as-any-baseline]
    if: always()
    steps:
      - name: Suite results
        run: |
          echo "mekann: ${{ needs.mekann.result }}"
          echo "prompt-core: ${{ needs['prompt-core'].result }}"
          echo "cache-friendly-prompt: ${{ needs['cache-friendly-prompt'].result }}"
          echo "agent-guidelines: ${{ needs['agent-guidelines'].result }}"
          echo "model-optimizer: ${{ needs['model-optimizer'].result }}"
          echo "command-normalization: ${{ needs['command-normalization'].result }}"
          echo "modes: ${{ needs.modes.result }}"
          echo "sandbox-unit: ${{ needs['sandbox-unit'].result }}"
          echo "sandbox-macos: ${{ needs['sandbox-macos'].result }}"
          echo "zip-repo: ${{ needs['zip-repo'].result }}"
          echo "subagent: ${{ needs.subagent.result }}"
          echo "autoresearch: ${{ needs.autoresearch.result }}"
          echo "goal: ${{ needs.goal.result }}"
          echo "output-gate: ${{ needs['output-gate'].result }}"
          echo "typecheck-prod: ${{ needs['typecheck-prod'].result }}"
          echo "ledger: ${{ needs.ledger.result }}"
          echo "lint: ${{ needs.lint.result }}"
          echo "as-any-baseline: ${{ needs['as-any-baseline'].result }}"
      - name: Fail if any suite did not succeed
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped') }}
        run: |
          echo "::error::One or more test suites or jobs did not succeed; see Suite results above"
          exit 1
