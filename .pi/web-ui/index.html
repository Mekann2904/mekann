<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LLM Behavior Analytics | pi Dashboard</title>
  <style>
    :root {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --bg-tertiary: #334155;
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --accent-green: #22c55e;
      --accent-yellow: #eab308;
      --accent-red: #ef4444;
      --accent-blue: #3b82f6;
      --accent-purple: #a855f7;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--bg-tertiary);
    }

    h1 {
      font-size: 24px;
      font-weight: 600;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: var(--bg-secondary);
      border-radius: 20px;
      font-size: 14px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent-green);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .metric-card {
      background: var(--bg-secondary);
      border-radius: 12px;
      padding: 20px;
    }

    .metric-label {
      font-size: 12px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .metric-value {
      font-size: 32px;
      font-weight: 700;
    }

    .metric-change {
      font-size: 12px;
      margin-top: 8px;
    }

    .metric-change.positive { color: var(--accent-green); }
    .metric-change.negative { color: var(--accent-red); }

    .panels-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 16px;
    }

    @media (max-width: 1024px) {
      .panels-grid {
        grid-template-columns: 1fr;
      }
    }

    .panel {
      background: var(--bg-secondary);
      border-radius: 12px;
      overflow: hidden;
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      border-bottom: 1px solid var(--bg-tertiary);
    }

    .panel-title {
      font-size: 16px;
      font-weight: 600;
    }

    .panel-content {
      padding: 16px 20px;
      max-height: 400px;
      overflow-y: auto;
    }

    .record-item {
      padding: 12px;
      background: var(--bg-tertiary);
      border-radius: 8px;
      margin-bottom: 8px;
    }

    .record-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .record-id {
      font-family: monospace;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .record-status {
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
    }

    .record-status.success { background: rgba(34, 197, 94, 0.2); color: var(--accent-green); }
    .record-status.failure { background: rgba(239, 68, 68, 0.2); color: var(--accent-red); }

    .record-metrics {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      font-size: 12px;
    }

    .record-metric {
      display: flex;
      flex-direction: column;
    }

    .record-metric-label {
      color: var(--text-secondary);
      font-size: 10px;
    }

    .anomaly-item {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 8px;
      border-left: 3px solid;
    }

    .anomaly-item.high {
      background: rgba(239, 68, 68, 0.1);
      border-color: var(--accent-red);
    }

    .anomaly-item.medium {
      background: rgba(234, 179, 8, 0.1);
      border-color: var(--accent-yellow);
    }

    .anomaly-item.low {
      background: rgba(59, 130, 246, 0.1);
      border-color: var(--accent-blue);
    }

    .anomaly-type {
      font-weight: 600;
      margin-bottom: 4px;
    }

    .anomaly-details {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .anomaly-time {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 8px;
    }

    .efficiency-bar {
      height: 8px;
      background: var(--bg-tertiary);
      border-radius: 4px;
      overflow: hidden;
      margin-top: 4px;
    }

    .efficiency-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.3s ease;
    }

    .efficiency-fill.high { background: var(--accent-green); }
    .efficiency-fill.medium { background: var(--accent-yellow); }
    .efficiency-fill.low { background: var(--accent-red); }

    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-secondary);
    }

    .error-message {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid var(--accent-red);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .refresh-btn {
      background: var(--accent-blue);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }

    .refresh-btn:hover {
      opacity: 0.9;
    }

    .empty-state {
      text-align: center;
      padding: 40px;
      color: var(--text-secondary);
    }

    .chart-container {
      height: 200px;
      display: flex;
      align-items: flex-end;
      gap: 4px;
      padding: 16px 0;
    }

    .chart-bar {
      flex: 1;
      background: var(--accent-blue);
      border-radius: 4px 4px 0 0;
      min-height: 4px;
      transition: height 0.3s ease;
    }

    .chart-bar:hover {
      background: var(--accent-purple);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>LLM Behavior Analytics</h1>
      <div class="status-badge">
        <span class="status-dot"></span>
        <span id="connection-status">Connected</span>
      </div>
    </header>

    <div id="error-container"></div>

    <div class="metrics-grid" id="metrics-grid">
      <div class="metric-card">
        <div class="metric-label">Total Runs</div>
        <div class="metric-value" id="metric-runs">-</div>
        <div class="metric-change positive" id="metric-runs-change"></div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Avg Efficiency</div>
        <div class="metric-value" id="metric-efficiency">-</div>
        <div class="efficiency-bar">
          <div class="efficiency-fill high" id="efficiency-fill" style="width: 0%"></div>
        </div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Avg Duration</div>
        <div class="metric-value" id="metric-duration">-</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Format Compliance</div>
        <div class="metric-value" id="metric-compliance">-</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Total Tokens</div>
        <div class="metric-value" id="metric-tokens">-</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Anomalies</div>
        <div class="metric-value" id="metric-anomalies">-</div>
      </div>
    </div>

    <div class="panels-grid">
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">Recent Records</span>
          <button class="refresh-btn" onclick="loadRecords()">Refresh</button>
        </div>
        <div class="panel-content" id="records-container">
          <div class="loading">Loading...</div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">Anomalies</span>
        </div>
        <div class="panel-content" id="anomalies-container">
          <div class="loading">Loading...</div>
        </div>
      </div>
    </div>

    <div class="panel" style="margin-top: 16px;">
      <div class="panel-header">
        <span class="panel-title">Efficiency Trend (Last 24 Hours)</span>
      </div>
      <div class="panel-content">
        <div class="chart-container" id="efficiency-chart">
          <div class="loading">Loading chart...</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = '/api/analytics';
    let refreshInterval = null;

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      loadAllData();
      // Auto-refresh every 30 seconds
      refreshInterval = setInterval(loadAllData, 30000);
    });

    async function loadAllData() {
      await Promise.all([
        loadSummary(),
        loadStats(),
        loadRecords(),
        loadAnomalies(),
        loadChart(),
      ]);
    }

    async function loadSummary() {
      try {
        const res = await fetch(`${API_BASE}/summary`);
        if (!res.ok) throw new Error('Failed to load summary');
        const data = await res.json();

        // Today's metrics
        if (data.today) {
          document.getElementById('metric-runs').textContent = data.today.totals.runs;
          document.getElementById('metric-efficiency').textContent =
            (data.today.averages.efficiency * 100).toFixed(0) + '%';
          document.getElementById('metric-duration').textContent =
            formatDuration(data.today.averages.durationMs);
          document.getElementById('metric-compliance').textContent =
            (data.today.averages.formatCompliance * 100).toFixed(0) + '%';
          document.getElementById('metric-tokens').textContent =
            formatNumber(data.today.totals.totalOutputTokens);

          // Efficiency bar
          const effWidth = data.today.averages.efficiency * 100;
          const effFill = document.getElementById('efficiency-fill');
          effFill.style.width = effWidth + '%';
          effFill.className = 'efficiency-fill ' +
            (effWidth >= 70 ? 'high' : effWidth >= 40 ? 'medium' : 'low');
        }
      } catch (error) {
        console.error('Failed to load summary:', error);
      }
    }

    async function loadStats() {
      try {
        const res = await fetch(`${API_BASE}/stats`);
        if (!res.ok) throw new Error('Failed to load stats');
        const data = await res.json();
        // Stats loaded successfully
      } catch (error) {
        console.error('Failed to load stats:', error);
      }
    }

    async function loadRecords() {
      const container = document.getElementById('records-container');
      container.innerHTML = '<div class="loading">Loading...</div>';

      try {
        const res = await fetch(`${API_BASE}/records?limit=20`);
        if (!res.ok) throw new Error('Failed to load records');
        const records = await res.json();

        if (records.length === 0) {
          container.innerHTML = '<div class="empty-state">No records found</div>';
          return;
        }

        container.innerHTML = records.map(record => `
          <div class="record-item">
            <div class="record-header">
              <span class="record-id">${record.id.slice(0, 12)}...</span>
              <span class="record-status ${record.execution.outcomeCode === 'SUCCESS' ? 'success' : 'failure'}">
                ${record.execution.outcomeCode}
              </span>
            </div>
            <div class="record-metrics">
              <div class="record-metric">
                <span class="record-metric-label">Source</span>
                <span>${record.source}</span>
              </div>
              <div class="record-metric">
                <span class="record-metric-label">Prompt</span>
                <span>${record.prompt.estimatedTokens} tok</span>
              </div>
              <div class="record-metric">
                <span class="record-metric-label">Output</span>
                <span>${record.output.estimatedTokens} tok</span>
              </div>
              <div class="record-metric">
                <span class="record-metric-label">Duration</span>
                <span>${formatDuration(record.execution.durationMs)}</span>
              </div>
              <div class="record-metric">
                <span class="record-metric-label">Efficiency</span>
                <span>${(calculateEfficiency(record) * 100).toFixed(0)}%</span>
              </div>
              <div class="record-metric">
                <span class="record-metric-label">Format</span>
                <span>${(record.quality.formatComplianceScore * 100).toFixed(0)}%</span>
              </div>
            </div>
          </div>
        `).join('');
      } catch (error) {
        container.innerHTML = `<div class="error-message">Failed to load records: ${error.message}</div>`;
      }
    }

    async function loadAnomalies() {
      const container = document.getElementById('anomalies-container');
      container.innerHTML = '<div class="loading">Loading...</div>';

      try {
        const res = await fetch(`${API_BASE}/anomalies`);
        if (!res.ok) throw new Error('Failed to load anomalies');
        const data = await res.json();

        document.getElementById('metric-anomalies').textContent = data.totalAnomalies;

        if (data.recentAnomalies.length === 0) {
          container.innerHTML = '<div class="empty-state">No anomalies detected</div>';
          return;
        }

        container.innerHTML = data.recentAnomalies.map(anomaly => `
          <div class="anomaly-item ${anomaly.severity}">
            <div class="anomaly-type">${formatAnomalyType(anomaly.type)}</div>
            <div class="anomaly-details">${anomaly.details}</div>
            <div class="anomaly-time">${new Date(anomaly.timestamp).toLocaleString()}</div>
          </div>
        `).join('');
      } catch (error) {
        container.innerHTML = `<div class="error-message">Failed to load anomalies: ${error.message}</div>`;
      }
    }

    async function loadChart() {
      const container = document.getElementById('efficiency-chart');
      container.innerHTML = '<div class="loading">Loading chart...</div>';

      try {
        const res = await fetch(`${API_BASE}/aggregates?type=hourly`);
        if (!res.ok) throw new Error('Failed to load chart data');
        const data = await res.json();

        if (data.length === 0) {
          container.innerHTML = '<div class="empty-state">No data available</div>';
          return;
        }

        const maxEfficiency = Math.max(...data.map(d => d.averages.efficiency));

        container.innerHTML = data.map(item => {
          const height = (item.averages.efficiency / maxEfficiency) * 180;
          return `<div class="chart-bar" style="height: ${height}px" title="${item.startTime}: ${(item.averages.efficiency * 100).toFixed(0)}%"></div>`;
        }).join('');
      } catch (error) {
        container.innerHTML = `<div class="error-message">Failed to load chart: ${error.message}</div>`;
      }
    }

    // Utility functions
    function formatDuration(ms) {
      if (ms < 1000) return `${ms}ms`;
      if (ms < 60000) return `${(ms / 1000).toFixed(1)}s`;
      return `${(ms / 60000).toFixed(1)}m`;
    }

    function formatNumber(num) {
      if (num < 1000) return num;
      if (num < 1000000) return `${(num / 1000).toFixed(1)}K`;
      return `${(num / 1000000).toFixed(1)}M`;
    }

    function formatAnomalyType(type) {
      const map = {
        'efficiency_drop': 'Efficiency Drop',
        'format_violation': 'Format Violation',
        'timeout_spike': 'Timeout Spike',
        'unusual_pattern': 'Unusual Pattern',
      };
      return map[type] || type;
    }

    function calculateEfficiency(record) {
      const tokenEff = record.output.estimatedTokens / Math.max(1, record.prompt.estimatedTokens);
      const formatEff = record.quality.formatComplianceScore;
      const qualityEff = record.quality.claimResultConsistency;
      return (Math.min(1, tokenEff) + formatEff + qualityEff) / 3;
    }
  </script>
</body>
</html>
